name: Build ChipTune Creator IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "chiptune-v*"

permissions:
  contents: read

jobs:
  unsigned-ipa:
    name: Build unsigned ChipTune Creator IPA
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        run: bash scripts/build_chiptune_creator_unsigned_ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChipTuneCreator-unsigned-ipa
          path: build/chiptune-creator-unsigned-ipa/ChipTuneCreator-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/chiptune-v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/chiptune-creator-unsigned-ipa/ChipTuneCreator-unsigned.ipa
          generate_release_notes: true
