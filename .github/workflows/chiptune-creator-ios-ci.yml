name: ChipTune Creator iOS CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chiptune-creator-ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ChipTune Creator
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project ChipTuneCreator.xcodeproj

      - name: Build for iOS simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project ChipTuneCreator.xcodeproj \
            -scheme ChipTuneCreator \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
